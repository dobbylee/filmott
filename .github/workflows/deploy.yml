name: Deploy

on:
  push:
    branches: [main]

jobs:
  test:
    uses: ./.github/workflows/ci.yml

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/filmott
            git fetch origin main
            git reset --hard origin/main
            docker compose -f docker-compose.prod.yml build --no-cache frontend backend
            docker compose -f docker-compose.prod.yml up -d frontend backend
            # nginx 재시작 (컨테이너 IP 변경 시 upstream resolve 갱신)
            docker compose -f docker-compose.prod.yml restart nginx
            # 백엔드 health check (최대 60초 대기, 실패 시 재시작)
            for i in $(seq 1 12); do
              sleep 5
              if curl -sf http://backend:3001/api/ > /dev/null 2>&1 || docker exec filmott-backend-1 wget -q -O- http://localhost:3001/api/ > /dev/null 2>&1; then
                echo "Backend is healthy"
                break
              fi
              if [ $i -eq 12 ]; then
                echo "Backend not responding, restarting..."
                docker compose -f docker-compose.prod.yml restart backend
                docker compose -f docker-compose.prod.yml restart nginx
              fi
            done
            # ISR 캐시 revalidation (에러 페이지 캐시 방지)
            REVAL_SECRET=$(grep REVALIDATE_SECRET ~/filmott/.env | cut -d= -f2-)
            if [ -n "$REVAL_SECRET" ]; then
              sleep 3
              docker compose -f docker-compose.prod.yml exec -T frontend \
                node -e "fetch('http://localhost:3000/internal/revalidate', {
                  method: 'POST',
                  headers: { 'Authorization': 'Bearer $REVAL_SECRET', 'Content-Type': 'application/json' },
                  body: JSON.stringify({path:'/'})
                }).then(r => r.text()).then(console.log).catch(console.error)"
              echo "ISR cache revalidated"
            fi
            docker image prune -f
