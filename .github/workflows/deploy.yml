name: Deploy
run-name: Deploy ${{ github.event.workflow_run.display_title }}

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' && github.event.workflow_run.head_branch == 'main' }}
    runs-on: ubuntu-latest
    steps:
      - uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -Eeuo pipefail

            cd ~/filmott

            compose() {
              docker compose --env-file .env -f docker-compose.prod.yml "$@"
            }

            print_diagnostics() {
              echo "=== docker compose ps ==="
              compose ps || true
              echo "=== frontend/backend/nginx logs ==="
              compose logs --tail=160 frontend backend nginx || true
            }

            trap 'echo "Deploy failed"; print_diagnostics' ERR

            test -f .env
            test -f backend/.env.production
            for var in DB_NAME DB_USERNAME DB_PASSWORD REVALIDATE_SECRET; do
              if ! grep -q "^${var}=" .env; then
                echo "Missing ${var} in ~/filmott/.env"
                exit 1
              fi
            done

            git fetch origin main
            git reset --hard origin/main

            compose config > /dev/null
            compose build --no-cache frontend backend
            compose up -d --remove-orphans frontend backend

            for service in frontend backend; do
              container_id=$(compose ps -q "$service")
              if [ -z "$container_id" ]; then
                echo "${service} container was not created"
                exit 1
              fi
              if [ "$(docker inspect -f '{{.State.Running}}' "$container_id")" != "true" ]; then
                echo "${service} container is not running"
                exit 1
              fi
            done

            # nginx 재시작 (컨테이너 IP 변경 시 upstream resolve 갱신)
            compose restart nginx

            # 백엔드 health check (최대 60초 대기)
            for i in $(seq 1 12); do
              sleep 5
              if docker exec "$(compose ps -q backend)" wget -q -O- http://localhost:3001/api/ > /dev/null 2>&1; then
                echo "Backend is healthy"
                break
              fi
              if [ $i -eq 12 ]; then
                echo "Backend not responding"
                exit 1
              fi
            done

            # 프론트엔드 readiness check (Next 서버가 3000 포트 listen할 때까지 대기)
            for i in $(seq 1 24); do
              if compose exec -T frontend \
                node -e "fetch('http://127.0.0.1:3000/robots.txt', { cache: 'no-store' }).then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"; then
                echo "Frontend is healthy"
                break
              fi
              if [ $i -eq 24 ]; then
                echo "Frontend not responding"
                exit 1
              fi
              sleep 5
            done

            # ISR 캐시 revalidation (에러 페이지 캐시 방지)
            REVAL_SECRET=$(grep REVALIDATE_SECRET ~/filmott/.env | cut -d= -f2-)
            if [ -n "$REVAL_SECRET" ]; then
              compose exec -T frontend \
                node -e "fetch('http://127.0.0.1:3000/internal/revalidate', {
                  method: 'POST',
                  headers: { 'Authorization': 'Bearer $REVAL_SECRET', 'Content-Type': 'application/json' },
                  body: JSON.stringify({path:'/', tags:['rankings','recent-reviews']})
                }).then(r => {
                  if (!r.ok) throw new Error('Revalidate failed: ' + r.status);
                  return r.text();
                }).then(console.log)"
              echo "ISR cache revalidated"
              compose exec -T frontend \
                node -e "fetch('http://127.0.0.1:3000/', { cache: 'no-store' }).then(r => {
                  if (!r.ok) throw new Error('Frontend warm failed: ' + r.status);
                  console.log('Frontend / warmed:', r.status);
                })"
            fi

            for i in $(seq 1 24); do
              status=$(curl -sk --resolve filmott.kr:443:127.0.0.1 -o /dev/null -w '%{http_code}' https://filmott.kr || true)
              if [ "$status" = "200" ]; then
                echo "Origin health check passed"
                break
              fi
              if [ $i -eq 12 ]; then
                echo "Origin is still not healthy, restarting nginx once..."
                compose restart nginx
              fi
              if [ $i -eq 24 ]; then
                echo "Origin health check failed: ${status}"
                exit 1
              fi
              sleep 5
            done

            www_status=$(curl -sk --resolve www.filmott.kr:443:127.0.0.1 -o /dev/null -w '%{http_code}' https://www.filmott.kr || true)
            if [ "$www_status" != "301" ]; then
              echo "www redirect check failed: ${www_status}"
              exit 1
            fi

            docker image prune -f
      - name: Verify external site through Cloudflare
        run: |
          set -Eeuo pipefail

          for i in $(seq 1 24); do
            status=$(curl -sS --connect-timeout 5 --max-time 15 -o /dev/null -w '%{http_code}' https://filmott.kr || true)
            if [ "$status" = "200" ]; then
              echo "External health check passed"
              break
            fi
            if [ $i -eq 24 ]; then
              echo "External health check failed: ${status}"
              exit 1
            fi
            sleep 5
          done

          www_status=$(curl -sS --connect-timeout 5 --max-time 15 -o /dev/null -w '%{http_code}' https://www.filmott.kr || true)
          if [ "$www_status" != "301" ]; then
            echo "External www redirect check failed: ${www_status}"
            exit 1
          fi
