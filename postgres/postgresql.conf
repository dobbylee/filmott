# === 메모리 ===
shared_buffers = 6GB                  # RAM의 25% (기본 128MB)
effective_cache_size = 18GB           # RAM의 75% (OS 캐시 포함 예상치)
work_mem = 32MB                       # 정렬/해시 연산 (기본 4MB, 벡터 검색에 유리)
maintenance_work_mem = 512MB          # VACUUM, CREATE INDEX 등 (기본 64MB)

# === 커넥션 ===
max_connections = 150                 # 기본 100 -> 150 (풀 50 + MCP/모니터링 예비)

# === WAL / 체크포인트 ===
wal_buffers = 16MB                    # shared_buffers의 1/32 (기본 -1 = auto)
checkpoint_completion_target = 0.9    # 체크포인트를 천천히 (기본 0.9, 명시)
min_wal_size = 1GB                    # WAL 최소 크기
max_wal_size = 4GB                    # WAL 최대 크기 (배치 upsert 대량 쓰기 대응)

# === 쿼리 플래너 ===
random_page_cost = 1.1                # SSD 기준 (기본 4.0, HDD 가정)
effective_io_concurrency = 200        # SSD 동시 I/O (기본 1)
default_statistics_target = 100       # ANALYZE 통계 샘플 (기본 100, 명시)

# === 병렬 처리 ===
max_worker_processes = 4              # CPU 코어 수 (기본 8)
max_parallel_workers_per_gather = 2   # 쿼리당 병렬 워커 (기본 2, 명시)
max_parallel_workers = 4              # 전체 병렬 워커 (기본 8)
max_parallel_maintenance_workers = 2  # VACUUM 등 병렬 (기본 2, 명시)

# === 로깅 ===
log_min_duration_statement = 1000     # 1초 이상 걸리는 쿼리 로깅

# === 기타 ===
timezone = 'Asia/Seoul'
